---
- name: 보안성 검사 (KISA U-01 ~ U-04, RHEL 8.6 기준)
  hosts: all
  gather_facts: yes
  become: yes
  tasks:

    # ── 기본 정보 ──────────────────────────────
    - name: umask 값 확인
      ansible.builtin.shell: umask
      register: umask_result

    - name: PASS_MAX_DAYS 추출
      ansible.builtin.shell: grep "^PASS_MAX_DAYS" /etc/login.defs | awk '{print $2}' | grep . || echo "not set"
      register: pass_max_days

    - name: PASS_MIN_DAYS 추출
      ansible.builtin.shell: grep "^PASS_MIN_DAYS" /etc/login.defs | awk '{print $2}' | grep . || echo "not set"
      register: pass_min_days

    - name: PASS_MIN_LEN 추출
      ansible.builtin.shell: grep "^PASS_MIN_LEN" /etc/login.defs | awk '{print $2}' | grep . || echo "not set"
      register: pass_min_len

    - name: 실행 중인 서비스 수
      ansible.builtin.shell: systemctl list-units --type=service --state=running --no-pager | grep -c "running"
      register: running_services

    # ── U-01: root 원격접속 제한 ───────────────
    - name: U-01 SSH PermitRootLogin 확인
      ansible.builtin.shell: grep "^PermitRootLogin" /etc/ssh/sshd_config | awk '{print $2}' | grep . || echo "not set"
      register: ssh_root

    - name: U-01 securetty pts 설정 확인
      ansible.builtin.shell: grep -c "^pts" /etc/securetty 2>/dev/null || echo "0"
      register: securetty_pts

    # ── U-02: 패스워드 복잡성 ──────────────────
    - name: U-02 minlen 확인
      ansible.builtin.shell: grep "^minlen" /etc/security/pwquality.conf | awk -F'=' '{print $2}' | tr -d ' ' | grep . || echo "not set"
      register: pwq_minlen

    - name: U-02 lcredit 확인
      ansible.builtin.shell: grep "^lcredit" /etc/security/pwquality.conf | awk -F'=' '{print $2}' | tr -d ' ' | grep . || echo "not set"
      register: pwq_lcredit

    - name: U-02 ucredit 확인
      ansible.builtin.shell: grep "^ucredit" /etc/security/pwquality.conf | awk -F'=' '{print $2}' | tr -d ' ' | grep . || echo "not set"
      register: pwq_ucredit

    - name: U-02 dcredit 확인
      ansible.builtin.shell: grep "^dcredit" /etc/security/pwquality.conf | awk -F'=' '{print $2}' | tr -d ' ' | grep . || echo "not set"
      register: pwq_dcredit

    - name: U-02 ocredit 확인
      ansible.builtin.shell: grep "^ocredit" /etc/security/pwquality.conf | awk -F'=' '{print $2}' | tr -d ' ' | grep . || echo "not set"
      register: pwq_ocredit

    # ── U-03: 계정 잠금 임계값 ─────────────────
    - name: U-03 pam_faillock deny 값 확인
      ansible.builtin.shell: >
        grep "^deny" /etc/security/faillock.conf 2>/dev/null
        | awk -F'=' '{print $2}' | tr -d ' ' | grep .
        || grep -oP "deny=\K[0-9]+" /etc/pam.d/system-auth 2>/dev/null | head -1 | grep .
        || echo "not set"
      register: faillock_deny

    - name: U-03 pam_faillock 설정 존재 여부 확인
      ansible.builtin.shell: >
        grep -E "pam_faillock" /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null
        | grep -v "^#" | head -2 | grep . || echo "not set"
      register: faillock_config

    # ── U-04: 패스워드 파일 보호 ───────────────
    - name: U-04 /etc/passwd shadow 사용 여부 확인
      ansible.builtin.shell: awk -F':' '$2 != "x" {print $1}' /etc/passwd | grep . || echo "없음"
      register: passwd_no_shadow

    - name: U-04 /etc/shadow 존재 여부 확인
      ansible.builtin.stat:
        path: /etc/shadow
      register: shadow_stat

    - name: U-04 빈 패스워드 계정 검사
      ansible.builtin.shell: awk -F':' '($2 == "" || $2 == "!") {print $1}' /etc/shadow 2>/dev/null | grep . || echo "없음"
      register: empty_passwd

    # ── 결과 출력 ──────────────────────────────
    - name: 결과 생성
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        def wcswidth(s):
            return sum(3 if ord(c) > 127 else 1 for c in str(s))

        def wljust(s, width):
            s = str(s)
            w = wcswidth(s)
            return s + ' ' * (width - w) if w < width else s

        def safe_int(val):
            try: return int(str(val).strip())
            except: return None

        def check_int_lte(val, limit):
            v = safe_int(val)
            return v is not None and v <= limit

        def check_int_gte(val, limit):
            v = safe_int(val)
            return v is not None and v >= limit

        def status(ok):
            return 'OK' if ok else 'WARNING'

        rows = [
            ('[umask]',              '{{ umask_result.stdout | trim }}',         status('{{ umask_result.stdout | trim }}' == '0027'),                        '다른 사용자 읽기 권한 차단'),
            ('[PASS_MAX_DAYS]',      '{{ pass_max_days.stdout | trim }}',        status(check_int_lte('{{ pass_max_days.stdout | trim }}', 90)),               '비밀번호 최대 사용기간 90일 이하'),
            ('[PASS_MIN_DAYS]',      '{{ pass_min_days.stdout | trim }}',        status(check_int_gte('{{ pass_min_days.stdout | trim }}', 1)),                '비밀번호 변경 후 최소 1일 유지'),
            ('[PASS_MIN_LEN]',       '{{ pass_min_len.stdout | trim }}',         status(check_int_gte('{{ pass_min_len.stdout | trim }}', 8)),                 '비밀번호 최소 8자리 이상'),
            ('[U-01] SSH',           '{{ ssh_root.stdout | trim }}',             status('{{ ssh_root.stdout | trim }}' == 'no'),                               'root SSH 직접 로그인 차단'),
            ('[U-01] Telnet pts',    '{{ securetty_pts.stdout | trim }}',        status('{{ securetty_pts.stdout | trim }}' == '0'),                           '/etc/securetty pts 항목 없어야 함'),
            ('[U-02] minlen',        '{{ pwq_minlen.stdout | trim }}',           status(check_int_gte('{{ pwq_minlen.stdout | trim }}', 8)),                   '비밀번호 최소 길이 8자 이상'),
            ('[U-02] lcredit',       '{{ pwq_lcredit.stdout | trim }}',          status(check_int_lte('{{ pwq_lcredit.stdout | trim }}', -1)),                 '소문자 최소 1자 요구'),
            ('[U-02] ucredit',       '{{ pwq_ucredit.stdout | trim }}',          status(check_int_lte('{{ pwq_ucredit.stdout | trim }}', -1)),                 '대문자 최소 1자 요구'),
            ('[U-02] dcredit',       '{{ pwq_dcredit.stdout | trim }}',          status(check_int_lte('{{ pwq_dcredit.stdout | trim }}', -1)),                 '숫자 최소 1자 요구'),
            ('[U-02] ocredit',       '{{ pwq_ocredit.stdout | trim }}',          status(check_int_lte('{{ pwq_ocredit.stdout | trim }}', -1)),                 '특수문자 최소 1자 요구'),
            ('[U-03] faillock deny', '{{ faillock_deny.stdout | trim }}',        status(check_int_lte('{{ faillock_deny.stdout | trim }}', 10)),               '로그인 실패 10회 이하 잠금'),
            ('[U-04] shadow 존재',   '{{ shadow_stat.stat.exists }}',            status('{{ shadow_stat.stat.exists }}' == 'True'),                            'shadow 파일 존재 여부'),
            ('[U-04] non-shadow',    '{{ passwd_no_shadow.stdout | trim }}',     status('{{ passwd_no_shadow.stdout | trim }}' in ['', '없음']),               '/etc/passwd 평문 계정 없어야 함'),
            ('[U-04] 빈 패스워드',   '{{ empty_passwd.stdout | trim }}',         status('{{ empty_passwd.stdout | trim }}' == '없음'),                        '빈 패스워드 계정 없어야 함'),
            ('[서비스]',             '{{ running_services.stdout | trim }}',     status(check_int_lte('{{ running_services.stdout | trim }}', 20)),            '불필요한 서비스 최소화'),
        ]

        headers = ['점검 항목', '현재 값', '상태', '설명']
        col_widths = [
            max(wcswidth(headers[i]), max(wcswidth(str(row[i])) for row in rows))
            for i in range(4)
        ]

        separator = '+' + '+'.join('-' * (w + 2) for w in col_widths) + '+'
        header    = '| ' + ' | '.join(wljust(headers[i], col_widths[i]) for i in range(4)) + ' |'

        ok_cnt   = sum(1 for r in rows if r[2] == 'OK')
        warn_cnt = sum(1 for r in rows if r[2] == 'WARNING')

        lines = []
        lines.append('Host : {{ inventory_hostname }}')
        lines.append('OS   : {{ ansible_distribution }} {{ ansible_distribution_version }}')
        lines.append('Time : {{ ansible_date_time.date }} {{ ansible_date_time.hour }}:{{ ansible_date_time.minute }}:{{ ansible_date_time.second }}')
        lines.append('기준 : KISA 주요정보통신기반시설 기술적 취약점 분석평가 가이드')
        lines.append(f'결과 : OK {ok_cnt}개 | WARNING {warn_cnt}개')
        lines.append('')
        lines.append(separator)
        lines.append(header)
        lines.append(separator)
        for row in rows:
            lines.append('| ' + ' | '.join(wljust(str(row[i]), col_widths[i]) for i in range(4)) + ' |')
        lines.append(separator)

        print('\n'.join(lines))
        PYEOF
      register: security_report

    - name: 보안 검사 결과 AWX 로그 출력
      ansible.builtin.debug:
        msg: "{{ security_report.stdout_lines }}"
