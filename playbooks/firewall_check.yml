---
- name: кІЂм‚¬ лЊЂмѓЃ лЏ™м Ѓ л“±лЎќ
  hosts: localhost
  gather_facts: false
  tasks:
    - name: source_hostлҐј лЏ™м Ѓ к·ёлЈ№м—ђ м¶”к°Ђ
      add_host:
        name: "{{ item.source_host }}"
        groups: fw_check_group
        target_ip: "{{ item.target_ip }}"
        target_port: "{{ item.target_port }}"
      loop: "{{ firewall_rules }}"

- name: л°©н™”лІЅ мІґнЃ¬
  hosts: fw_check_group
  gather_facts: yes
  become: yes
  tasks:
    - name: нЏ¬нЉё м—ґл ¤мћ€лЉ”м§Ђ н™•мќё (nc)
      shell: nc -zv {{ target_ip }} {{ target_port }} 2>&1 && echo "OPEN" || echo "CLOSED"
      register: port_check
      ignore_errors: yes

    - name: firewalld к·њм№™ н™•мќё
      shell: firewall-cmd --list-all 2>&1 || echo "firewalld not running"
      register: firewalld_rules

    - name: iptables к·њм№™ н™•мќё
      shell: iptables -L -n | grep {{ target_port }} || echo "no iptables rule for {{ target_port }}"
      register: iptables_rules

    - name: кІ°кіјлҐј hostvarsм—ђ м ЂмћҐ
      set_fact:
        fw_result:
          source_host: "{{ inventory_hostname }}"
          target_ip: "{{ target_ip }}"
          target_port: "{{ target_port }}"
          port_status: "{{ port_check.stdout | replace('\n', ' ') }}"
          firewalld: "{{ firewalld_rules.stdout | replace('\n', ' | ') }}"
          iptables: "{{ iptables_rules.stdout | replace('\n', ' | ') }}"

- name: м „мІґ кІ°кіј м¶њл Ґ
  hosts: localhost
  gather_facts: true
  tasks:
    - name: кІ°кіј мѓќм„±
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        def wcswidth(s):
            return sum(2 if ord(c) > 127 else 1 for c in str(s))

        def wljust(s, width):
            s = str(s)
            w = wcswidth(s)
            return s + ' ' * (width - w) if w < width else s

        results = [
        {% for host in groups['fw_check_group'] %}
          {
            'source_host': '{{ host }}',
            'target_ip'  : '{{ hostvars[host].fw_result.target_ip }}',
            'target_port': '{{ hostvars[host].fw_result.target_port }}',
            'port_status': '{{ hostvars[host].fw_result.port_status }}',
            'firewalld'  : '{{ hostvars[host].fw_result.firewalld }}',
            'iptables'   : '{{ hostvars[host].fw_result.iptables }}',
          },
        {% endfor %}
        ]

        rows = []
        for r in results:
            is_open = 'OPEN' in r['port_status']
            rows.append((
                r['source_host'],
                r['target_ip'],
                str(r['target_port']),
                'OPEN' if is_open else 'BLOCKED'
            ))

        headers = ['м¶њл°њм§Ђ', 'лЄ©м Ѓм§Ђ', 'нЏ¬нЉё', 'кІ°кіј']
        col_widths = [
            max(wcswidth(headers[i]), max(wcswidth(str(row[i])) for row in rows))
            for i in range(4)
        ]

        separator = '+' + '+'.join('-' * (w + 2) for w in col_widths) + '+'
        header    = '| ' + ' | '.join(wljust(headers[i], col_widths[i]) for i in range(4)) + ' |'

        open_cnt  = sum(1 for r in rows if r[3] == 'OPEN')
        block_cnt = sum(1 for r in rows if r[3] == 'BLOCKED')
        total     = len(rows)
        bar_width = sum(col_widths) + len(col_widths) * 3 + 1

        lines = []
        lines.append('=' * bar_width)
        lines.append('л°©н™”лІЅ м ђкІЂ кІ°кіј ліґкі м„њ')
        lines.append('=' * bar_width)
        lines.append('Time : {{ ansible_date_time.date }} {{ ansible_date_time.hour }}:{{ ansible_date_time.minute }}:{{ ansible_date_time.second }}')
        lines.append(f'кІ°кіј : OPEN {open_cnt}к°њ | BLOCKED {block_cnt}к°њ | мґќ {total}к°њ')
        lines.append('')
        lines.append(separator)
        lines.append(header)
        lines.append(separator)
        for row in rows:
            lines.append('| ' + ' | '.join(wljust(str(row[i]), col_widths[i]) for i in range(4)) + ' |')
        lines.append(separator)
        lines.append('')

        for r in results:
            is_open = 'OPEN' in r['port_status']
            lines.append('-' * bar_width)
            lines.append(f"[{r['source_host']} -> {r['target_ip']}:{r['target_port']}] {'OPEN' if is_open else 'BLOCKED'}")
            lines.append('[firewalld к·њм№™]')
            for line in r['firewalld'].split(' | '):
                lines.append('  ' + line.strip())
            lines.append('[iptables к·њм№™]')
            for line in r['iptables'].split(' | '):
                lines.append('  ' + line.strip())
            lines.append('')

        print('\n'.join(lines))
        PYEOF
      register: firewall_report

    - name: л°©н™”лІЅ кІЂм‚¬ кІ°кіј м¶њл Ґ
      ansible.builtin.debug:
        msg: "{{ firewall_report.stdout_lines }}"
